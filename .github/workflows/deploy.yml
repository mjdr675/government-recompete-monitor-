name: Deploy Recompete

on:
  push:
    branches: [ "main" ]

# Serialize deploys so two pushes to main cannot run overlapping
# `git reset --hard` + `systemctl restart` sequences against the same VPS.
# cancel-in-progress: false → never kill an in-flight deploy; queue the next.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Stub ae CLI
        run: |
          sudo mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho "ae stub running"' | sudo tee /usr/local/bin/ae
          sudo chmod +x /usr/local/bin/ae

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          echo "$SSH_KEY" | tr -d '\r' > $RUNNER_TEMP/deploy_key
          chmod 644 $RUNNER_TEMP/deploy_key

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /github/runner_temp/deploy_key
          script: |
            cd /home/michael/government-recompete-monitor-
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            sudo systemctl restart recompete
            sudo systemctl status recompete --no-pager
