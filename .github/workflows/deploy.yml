name: Deploy Recompete

on:
  push:
    branches: [ "main" ]

# Serialize deploys so two pushes to main cannot run overlapping
# `git reset --hard` + `systemctl restart` sequences against the same VPS.
# cancel-in-progress: false → never kill an in-flight deploy; queue the next.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Stub ae CLI
        run: |
          sudo mkdir -p /usr/local/bin
          echo -e '#!/bin/bash\necho "ae stub running"' | sudo tee /usr/local/bin/ae
          sudo chmod +x /usr/local/bin/ae

      - name: Run tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Write SSH key
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          python3 - <<'EOF'
          import os
          key = os.environ.get('SSH_KEY', '')
          key = key.replace('\r\n', '\n').replace('\r', '\n')
          if not key.endswith('\n'):
              key += '\n'
          path = os.path.join(os.environ['RUNNER_TEMP'], 'deploy_key')
          with open(path, 'w') as f:
              f.write(key)
          EOF
          chmod 644 $RUNNER_TEMP/deploy_key

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /github/runner_temp/deploy_key
          # script_stop: belt-and-suspenders — the action aborts on any non-zero
          # command even if the inline `set -e` below is ever removed.
          script_stop: true
          script: |
            set -e
            cd /home/michael/government-recompete-monitor-
            git fetch origin
            git reset --hard origin/main
            git clean -fd
            # Snapshot the database AFTER the code update (so this script is the
            # current version) but BEFORE restart triggers init_db()/migrations.
            # `set -e` above means a non-zero exit here ABORTS the deploy, so the
            # restart (and thus migrations) never runs without a fresh snapshot.
            bash scripts/backup_db.sh predeploy
            sudo systemctl restart recompete
            sudo systemctl status recompete --no-pager
