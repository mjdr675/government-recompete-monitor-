<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Gov Recompete Monitor{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;color:#222;">
  <!-- preheader (hidden preview text) -->
  <div style="display:none;max-height:0;overflow:hidden;mso-hide:all;">
    {% block preheader %}{% endblock %}
  </div>

  <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f4f4;padding:24px 0;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:8px;overflow:hidden;">

          <!-- Header -->
          <tr>
            <td style="background:#1f4f8f;padding:20px 32px;">
              <span style="color:#ffffff;font-size:20px;font-weight:bold;letter-spacing:0.5px;">Gov Recompete Monitor</span>
            </td>
          </tr>

          <!-- Content -->
          <tr>
            <td style="padding:32px;font-size:14px;line-height:1.6;color:#222;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="background:#f9f9f9;padding:20px 32px;border-top:1px solid #eeeeee;font-size:12px;color:#888888;">
              You received this email because you registered at govrecompete.com.<br>
              <a href="{{ unsubscribe_url | default('#') }}" style="color:#1f4f8f;text-decoration:none;">Unsubscribe</a>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
