{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<h1>Sign In</h1>
<div class="muted" style="margin-bottom:20px;">
  Sign in to your Recompete account
</div>

{% if error %}
<p style="color:#b00020;margin-bottom:16px;">{{ error }}</p>
{% endif %}

<form method="post" style="max-width:380px;">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <div style="margin-bottom:14px;">
    <label style="display:block;margin-bottom:4px;font-weight:bold;">Email</label>
    <input type="email" name="email" required autofocus
           style="width:100%;padding:9px;box-sizing:border-box;">
  </div>
  <div style="margin-bottom:6px;">
    <label style="display:block;margin-bottom:4px;font-weight:bold;">Password</label>
    <input type="password" name="password" required
           style="width:100%;padding:9px;box-sizing:border-box;">
  </div>
  <div style="margin-bottom:18px;text-align:right;">
    <a href="/forgot-password" style="font-size:13px;color:#666;">Forgot password?</a>
  </div>
  <button type="submit" style="width:100%;padding:10px;">Sign In</button>
</form>

<p style="margin-top:18px;">
  Don't have an account? <a href="/register">Create one</a>
</p>
{% endblock %}
