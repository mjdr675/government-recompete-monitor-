{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<h1>Create Account</h1>
<div class="muted" style="margin-bottom:20px;">
  Get started with the Recompete Intelligence Platform
</div>

{% if error %}
<p style="color:#b00020;margin-bottom:16px;">{{ error }}</p>
{% endif %}

<form method="post" style="max-width:380px;">
  <div style="margin-bottom:14px;">
    <label style="display:block;margin-bottom:4px;font-weight:bold;">Email</label>
    <input type="email" name="email" required autofocus
           style="width:100%;padding:9px;box-sizing:border-box;">
  </div>
  <div style="margin-bottom:14px;">
    <label style="display:block;margin-bottom:4px;font-weight:bold;">
      Password <span class="muted">(8 characters minimum)</span>
    </label>
    <input type="password" name="password" required
           style="width:100%;padding:9px;box-sizing:border-box;">
  </div>
  <div style="margin-bottom:18px;">
    <label style="display:block;margin-bottom:4px;font-weight:bold;">Confirm Password</label>
    <input type="password" name="confirm" required
           style="width:100%;padding:9px;box-sizing:border-box;">
  </div>
  <button type="submit" style="width:100%;padding:10px;">Create Account</button>
</form>

<p style="margin-top:18px;">
  Already have an account? <a href="/login">Sign in</a>
</p>
{% endblock %}
