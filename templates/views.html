{% extends "base.html" %}
{% block title %}Intelligence Views{% endblock %}

{% block content %}
<h1>Intelligence Views</h1>
<div class="muted">Saved filters for common research scenarios.</div>

<div class="cards" style="margin-top:20px;">
  {% for key, v in views.items() %}
    <a class="card" href="/views/{{ key }}" style="text-decoration:none;color:inherit;min-width:200px;">
      <div style="font-weight:bold;font-size:15px;">{{ v.label }}</div>
      <div class="muted" style="margin-top:6px;font-size:13px;">{{ v.filters.items() | map('join', ': ') | join(', ') }}</div>
    </a>
  {% endfor %}
</div>
{% endblock %}
