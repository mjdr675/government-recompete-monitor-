{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<h1>Reset Password</h1>

{% if error %}
<p style="color:#b00020;margin-bottom:16px;">{{ error }}</p>
{% if not token %}
<p><a href="/forgot-password">Request a new reset link</a></p>
{% endif %}
{% endif %}

{% if token %}
<form method="post" style="max-width:380px;">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
  <input type="hidden" name="token" value="{{ token }}">
  <div style="margin-bottom:14px;">
    <label style="display:block;margin-bottom:4px;font-weight:bold;">New Password</label>
    <input type="password" name="password" required autofocus minlength="8"
           style="width:100%;padding:9px;box-sizing:border-box;">
  </div>
  <div style="margin-bottom:18px;">
    <label style="display:block;margin-bottom:4px;font-weight:bold;">Confirm Password</label>
    <input type="password" name="confirm" required minlength="8"
           style="width:100%;padding:9px;box-sizing:border-box;">
  </div>
  <button type="submit" style="width:100%;padding:10px;">Set New Password</button>
</form>
{% endif %}
{% endblock %}
