[build]
  builder = "nixpacks"

[[services]]
  name = "web"
  [services.deploy]
    # Fail-closed DB snapshot (local + R2 upload/restore-verify) run at the START
    # of the web container — the only place the SQLite volume is actually mounted.
    #
    # This is deliberately NOT a preDeployCommand: Railway runs pre-deploy commands
    # in a SEPARATE container with no volumes mounted
    # (https://docs.railway.com/guides/pre-deploy-command), so a pre-deploy backup
    # could never read the live DB — it would silently snapshot nothing. Railway's
    # own guidance is to do volume work in the start command instead.
    #
    # The `&&` makes it fail-closed: if the snapshot or its R2 upload/verify exits
    # non-zero, gunicorn never starts, so init_db()'s migrations (which run when
    # gunicorn imports the app) never execute without a verified backup.
    # Tradeoff vs the old per-deploy hook: this runs on every web container start
    # (deploys, restarts, replica scale-ups) — more backup points, same guarantee.
    # Requires awscli (see nixpacks.toml) and the R2_* env vars; point
    # RECOMPETE_BACKUP_DIR at the mounted volume for a persistent local copy.
    startCommand = "bash scripts/backup_db.sh predeploy && gunicorn app:app --bind 0.0.0.0:$PORT"
  # Shared datastore (Postgres) + broker (Redis) references. The LIVE Railway
  # services are dashboard-managed and named differently (government-recompete-
  # monitor-, Redis, Postgres), so these SAME references must also be set on
  # those services in the dashboard — see docs/DEPLOYMENT.md §8b.
  [services.variables]
    DATABASE_URL = "${{Postgres.DATABASE_URL}}"
    REDIS_URL = "${{Redis.REDIS_URL}}"

# Daily contract ingest cron — canonical production schedule and the SOLE owner
# of the nightly ingest. Celery beat no longer schedules run_ingest (see
# tasks.py) so ingest never runs twice.
# Fires at 06:00 UTC every day and POSTs to /ingest/run.
# Required Railway env vars:
#   CRON_SECRET — shared secret that authenticates the cron caller
#   (also set on the web service so /ingest/run can verify it)
# The /ingest/run endpoint is idempotent: if a successful ingest already ran
# today it returns 200 {"status":"already_ran"} without re-running.
# Pass the request body {"force":1} to bypass this check if needed.
[[services]]
  name = "daily-ingest"
  [services.deploy]
    cronSchedule = "0 6 * * *"
    startCommand = "curl -sf -X POST https://recompete.us/ingest/run -H \"Authorization: Bearer $CRON_SECRET\" -H \"Content-Type: application/json\" -d '{}'"

# NOTE: there is intentionally no `daily-backup` cron *service* here.
# A Railway volume binds to a single service, and the SQLite DB volume must stay
# on `web`, so a separate cron service would have no DB file and would no-op
# permanently. Daily backups are a FOLLOW-UP that must reuse the ingest-cron
# pattern: a cron service that curls a CRON_SECRET-protected endpoint on `web`
# (which shells out to `scripts/backup_db.sh daily` in the container that owns the
# DB volume). See docs/DEPLOYMENT.md. Pre-deploy backup above is already live.

# ─────────────────────────────────────────────────────────────────────────────
# O5 / Gate 3 — Celery worker + beat services (ACTIVE on this branch).
#
# Postgres and Redis are now provisioned in the Railway project. worker and beat
# run the Procfile commands and reference the SHARED Postgres + Redis so they
# operate on the same data as web. The broker is REDIS_URL (already live).
#
# ⚠️  DO NOT MERGE OR DEPLOY THIS BRANCH until the human-only Postgres data
# cutover in docs/O5_POSTGRES_MIGRATION_PLAN.md is complete: set DATABASE_URL on
# the live `web`/government-recompete-monitor- service, build the schema, migrate
# SQLite→Postgres data, and pass the integrity gate. Deploying before that points
# every service at an EMPTY Postgres and would run scheduled jobs against no data.
# Activating the service definitions here is repo-side groundwork only.
[[services]]
  name = "worker"
  [services.deploy]
    startCommand = "celery -A tasks worker --loglevel=info"
  [services.variables]
    DATABASE_URL = "${{Postgres.DATABASE_URL}}"
    REDIS_URL = "${{Redis.REDIS_URL}}"

[[services]]
  name = "beat"
  # NOTE (schedule persistence): PersistentScheduler writes its schedule state to a
  # local file, which resets on each redeploy/restart on Railway's ephemeral
  # storage. Low-impact for these crontab-style entries (they re-seed from
  # tasks.py on startup), but "persistent" state is not actually durable. A
  # Redis-backed scheduler (celery-redbeat, reusing the live Redis) or a small
  # attached volume on `beat` may be considered later if durable schedule state
  # matters. Left as-is here to avoid changing runtime behavior.
  [services.deploy]
    startCommand = "celery -A tasks beat --loglevel=info --scheduler celery.beat.PersistentScheduler"
  [services.variables]
    DATABASE_URL = "${{Postgres.DATABASE_URL}}"
    REDIS_URL = "${{Redis.REDIS_URL}}"
# ─────────────────────────────────────────────────────────────────────────────
