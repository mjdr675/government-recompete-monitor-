[build]
  builder = "nixpacks"

[[services]]
  name = "web"
  [services.deploy]
    # Fail-closed pre-deploy DB snapshot (local + R2 upload/restore-verify).
    # Runs after the build and BEFORE the new deployment goes live, inside the
    # web container where the SQLite volume is mounted. A non-zero exit HALTS the
    # deploy, so migrations (run at startup via init_db()) never execute without
    # a verified backup. Requires awscli (see nixpacks.toml) and the R2_* env vars.
    preDeployCommand = "bash scripts/backup_db.sh predeploy"
    startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT"

# Daily contract ingest cron — canonical production schedule.
# Fires at 06:00 UTC every day and POSTs to /ingest/run.
# Required Railway env vars:
#   CRON_SECRET — shared secret that authenticates the cron caller
#   (also set on the web service so /ingest/run can verify it)
# The /ingest/run endpoint is idempotent: if a successful ingest already ran
# today it returns 200 {"status":"already_ran"} without re-running.
# Pass the request body {"force":1} to bypass this check if needed.
[[services]]
  name = "daily-ingest"
  [services.deploy]
    cronSchedule = "0 6 * * *"
    startCommand = "curl -sf -X POST https://recompete.us/ingest/run -H \"Authorization: Bearer $CRON_SECRET\" -H \"Content-Type: application/json\" -d '{}'"

# NOTE: there is intentionally no `daily-backup` cron *service* here.
# A Railway volume binds to a single service, and the SQLite DB volume must stay
# on `web`, so a separate cron service would have no DB file and would no-op
# permanently. Daily backups are a FOLLOW-UP that must reuse the ingest-cron
# pattern: a cron service that curls a CRON_SECRET-protected endpoint on `web`
# (which shells out to `scripts/backup_db.sh daily` in the container that owns the
# DB volume). See docs/DEPLOYMENT.md. Pre-deploy backup above is already live.
