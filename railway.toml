[build]
  builder = "nixpacks"

[[services]]
  name = "web"
  [services.deploy]
    startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT"

# Daily contract ingest cron — canonical production schedule.
# Fires at 06:00 UTC every day and POSTs to /ingest/run.
# Required Railway env vars:
#   CRON_SECRET — shared secret that authenticates the cron caller
#   (also set on the web service so /ingest/run can verify it)
# The /ingest/run endpoint is idempotent: if a successful ingest already ran
# today it returns 200 {"status":"already_ran"} without re-running.
# Pass the request body {"force":1} to bypass this check if needed.
[[services]]
  name = "daily-ingest"
  [services.deploy]
    cronSchedule = "0 6 * * *"
    startCommand = "curl -sf -X POST https://recompete.us/ingest/run -H \"Authorization: Bearer $CRON_SECRET\" -H \"Content-Type: application/json\" -d '{}'"

# Daily off-site database backup to Cloudflare R2.
# Commented out until its two prerequisites are met on this service:
#   1. Attach the SAME persistent volume that holds the SQLite DB (so DB_PATH
#      resolves to the live database — a separate service has its own empty disk).
#   2. Install the `aws` CLI in the build (e.g. nixpacks aptPkgs = ["awscli"],
#      or `pip install awscli`), since backup_db.sh uploads via the S3 API.
# Required env vars (set on this service): DB_PATH, R2_ENDPOINT, R2_ACCESS_KEY_ID,
# R2_SECRET_ACCESS_KEY, R2_BUCKET (and optional R2_REGION / RECOMPETE_R2_RETAIN_DAYS).
# The script is fail-closed and idempotent, so a daily run is safe.
